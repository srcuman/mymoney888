# 独立部署模式 - 仅使用本地文件存储
# 适用于不需要 PostgreSQL 的场景，数据完全保存在本地文件系统
version: '3.8'

services:
  mymoney888:
    build:
      context: .
      dockerfile: Dockerfile
    image: mymoney888:latest
    container_name: mymoney888
    ports:
      - "8888:8888"
    restart: always
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:8888/api
      # 不连接数据库，使用本地文件存储
      - DB_HOST=
      - DB_PORT=
      - DATA_DIR=/data
      - AUTO_BACKUP_INTERVAL=5
      - AUTO_BACKUP_ON_CHANGE=true
    volumes:
      - app_data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8888', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  app_data:

networks:
  default:
    driver: bridge
