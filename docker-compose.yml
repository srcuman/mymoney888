version: '3.8'

services:
  mymoney888:
    # 从GitHub仓库构建
    build:
      context: https://github.com/srcuman/mymoney888.git
      dockerfile: Dockerfile
    ports:
      - "8888:8888"
    restart: always
    environment:
      - NODE_ENV=production
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
