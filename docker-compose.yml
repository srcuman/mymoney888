version: '3.8'

services:
  app:
    image: ghcr.io/srcuman/mymoney888:latest
    container_name: mymoney888-app
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-mymoney888}
      - DB_PASSWORD=${DB_PASSWORD:-mymoney888}
      - DB_NAME=${DB_NAME:-mymoney888}
      - JWT_SECRET=${JWT_SECRET:-mymoney888-secret-key-change-in-production}
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
