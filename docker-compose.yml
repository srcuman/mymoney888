version: '3.8'

services:
  mymoney888:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_REPO: https://gitee.com/srcuman/mymoney888.git
        GIT_BRANCH: main
    # 从gitee仓库拉取代码构建，支持远程部署
    image: mymoney888:latest
    container_name: mymoney888
    ports:
      - "8888:8888"
    restart: always
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:8888/api
      # ============ 数据库配置（修改这里） ============
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=mymoney888
      - DB_NAME=mymoney888
      # ============================================
      - NPM_CONFIG_REGISTRY=https://registry.npmmirror.com
      - DATA_DIR=/data
      - AUTO_BACKUP_INTERVAL=30
      - AUTO_BACKUP_ON_CHANGE=true
    volumes:
      - app_data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8888', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: mymoney888-postgres
    restart: always
    environment:
      # ============ 数据库配置（修改这里） ============
      - POSTGRES_PASSWORD=mymoney888
      - POSTGRES_DB=mymoney888
      - POSTGRES_USER=postgres
      # ============================================
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mymoney888"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  app_data:

networks:
  default:
    driver: bridge
