version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mymoney888-mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=mymoney888-root
      - MYSQL_DATABASE=mymoney888
      - MYSQL_USER=mymoney888
      - MYSQL_PASSWORD=mymoney888
      - TZ=Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - mymoney888-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmymoney888-root"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: mymoney888-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=mysql
      - DB_USER=mymoney888
      - DB_PASSWORD=mymoney888
      - DB_NAME=mymoney888
      - JWT_SECRET=mymoney888-secret-key-change-in-production
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - mymoney888-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mymoney888-frontend
    restart: always
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://backend:3000/api
      - NPM_CONFIG_REGISTRY=https://registry.npmmirror.com
    depends_on:
      - backend
    ports:
      - "8888:8888"
    networks:
      - mymoney888-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8888', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  mysql_data:
    driver: local

networks:
  mymoney888-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16