version: '3.8'

services:
  mymoney888:
    # 从本地构建（修改代码后需要重新构建）
    build:
      context: .
      dockerfile: Dockerfile
    
    image: mymoney888-nosql:latest
    container_name: mymoney888
    ports:
      - "8888:8888"
    restart: always
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:8888/api
      # ============ 数据库配置 ============
      # 修改下面的值匹配你的 PostgreSQL 配置
      - DB_HOST=localhost
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=mymoney888
      # ===================================
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # 健康检查
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8888', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# 网络配置
networks:
  default:
    driver: bridge
