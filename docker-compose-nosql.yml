version: '3.8'

services:
  mymoney888:
    # 从GitHub仓库构建
    build:
      context: https://github.com/srcuman/mymoney888.git
      dockerfile: Dockerfile
      # 国内用户如遇到镜像拉取问题，可取消注释以下配置使用镜像源
      # args:
      #   - NODE_IMAGE=docker.mirrors.sjtug.sjtu.edu.cn/library/node:25.8.0-alpine
    image: mymoney888:latest
    container_name: mymoney888
    ports:
      - "${APP_PORT:-8888}:8888"
    restart: always
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:8888/api
      # ============ 数据库配置（修改这里） ============
      - DB_HOST=${DB_HOST:-host.docker.internal}  # PostgreSQL 主机地址
      - DB_PORT=${DB_PORT:-5432}                  # PostgreSQL 端口
      - DB_USER=${DB_USER:-postgres}              # PostgreSQL 用户名
      - DB_PASSWORD=${DB_PASSWORD:-mymoney888}    # PostgreSQL 密码
      - DB_NAME=${DB_NAME:-mymoney888}           # 数据库名称
      # ============================================
      - NPM_CONFIG_REGISTRY=https://registry.npmmirror.com
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # 健康检查
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8888', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

# 网络配置 - 显式定义桥接网络
networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
