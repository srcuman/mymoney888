<!DOCTYPE html>
<html>
<head>
    <title>检查用户数据</title>
</head>
<body>
    <h1>用户数据检查</h1>
    <div id="user-data"></div>
    <script>
        const user = localStorage.getItem('user');
        const users = localStorage.getItem('users');
        const container = document.getElementById('user-data');
        
        if (user) {
            container.innerHTML += '<h2>当前用户：</h2>';
            container.innerHTML += '<pre>' + JSON.stringify(JSON.parse(user), null, 2) + '</pre>';
        } else {
            container.innerHTML += '<p>当前用户不存在</p>';
        }
        
        if (users) {
            container.innerHTML += '<h2>所有用户：</h2>';
            container.innerHTML += '<pre>' + JSON.stringify(JSON.parse(users), null, 2) + '</pre>';
        } else {
            container.innerHTML += '<p>用户列表不存在</p>';
        }
    </script>
</body>
</html>
