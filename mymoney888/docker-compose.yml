version: '3.8'

services:
  backend:
    image: ghcr.io/srcuman/mymoney888-backend:latest
    container_name: mymoney888-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-mymoney888}
      - DB_PASSWORD=${DB_PASSWORD:-mymoney888}
      - DB_NAME=${DB_NAME:-mymoney888}
      - JWT_SECRET=${JWT_SECRET:-mymoney888-secret-key-change-in-production}
    ports:
      - "30001:3000"
    # networks:
    #   - mymoney888-network
    # healthcheck:
    #   test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 60s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    image: ghcr.io/srcuman/mymoney888-frontend:latest
    container_name: mymoney888-frontend
    restart: always
    environment:
      - NODE_ENV=production
      - VITE_API_URL=${VITE_API_URL:-http://localhost:30001/api}
    depends_on:
      - backend
    ports:
      - "8888:8888"
